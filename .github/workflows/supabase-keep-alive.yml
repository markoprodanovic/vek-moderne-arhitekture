name: Supabase Keep Alive

on:
  schedule:
    # Runs every Monday and Thursday at 08:00 UTC
    - cron: "0 8 * * 1,4"
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Write to keep_alive table
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/rest/v1/keep_alive" \
            -H "apikey: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d '{"id": 1, "pinged_at": "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}')

          echo "Response status: $response"

          if [ "$response" != "200" ] && [ "$response" != "201" ]; then
            echo "Unexpected response: $response"
            exit 1
          fi

          echo "Supabase keep-alive write successful."
