name: Supabase Keep Alive

on:
  schedule:
    # Runs every Monday and Thursday at 08:00 UTC
    - cron: "0 8 * * 1,4"
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/rest/v1/eras?select=id&limit=1" \
            -H "apikey: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}")

          echo "Response status: $response"

          if [ "$response" != "200" ]; then
            echo "Unexpected response: $response"
            exit 1
          fi

          echo "Supabase is alive."
